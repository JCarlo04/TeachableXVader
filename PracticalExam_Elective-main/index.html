<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — Sentiment Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ── HEADER ───────────────────────────────── -->
    <div class="header">
        <div class="header-brand">
            <div class="header-logo">
                <!-- eye / waveform icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/>
                </svg>
            </div>
            <div>
                <div class="header-title">Sentinel</div>
                <div class="header-sub">Sentiment Analyzer v1.0</div>
            </div>
        </div>

        <div class="header-actions">
            <div class="live-indicator">
                <div class="live-dot" id="live-dot"></div>
                <span id="live-label">Offline</span>
            </div>
            <button id="camera-btn" class="btn-sentinel btn-primary-action" type="button" onclick="init()">
                Start Camera
            </button>
            <button id="theme-btn" class="btn-sentinel" type="button" onclick="toggleTheme()">
                Light Mode
            </button>
        </div>
    </div>

    <!-- ── MAIN LAYOUT ──────────────────────────── -->
    <div class="container-fluid">
        <div class="row h-100">

            <!-- LEFT: Camera Feed -->
            <div class="col-md-8 mb-0">
                <div class="panel video-section">

                    <div class="panel-header">
                        <div class="panel-label">Camera Feed</div>
                        <div class="panel-badge" id="feed-status">No Signal</div>
                    </div>

                    <!-- Camera canvas fills this area -->
                    <div id="video-wrapper">
                        <div id="webcam-container"></div>
                        <div id="effect-overlay"></div>
                    </div>

                    <!-- Raw probability badges -->
                    <div class="prob-section">
                        <div class="prob-title">Model Probabilities</div>
                        <div id="label-container"></div>
                    </div>

                </div>
            </div>

            <!-- RIGHT: Reaction Log -->
            <div class="col-md-4">
                <div class="panel chat-section">

                    <div class="panel-header">
                        <div class="panel-label">Reaction History</div>
                        <div class="panel-badge" id="log-count">0 events</div>
                    </div>

                    <div class="reaction-meta">
                        Logging detections above
                        <span>90% confidence</span>
                    </div>

                    <div id="chat-box">
                        <div class="chat-empty" id="chat-empty">
                            <div class="chat-empty-icon">◎</div>
                            <div>Awaiting detections…</div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
